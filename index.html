<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>VR Earth & Complete Solar System Explorer</title>
  <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
  <script src="https://unpkg.com/aframe-environment-component@1.3.3/dist/aframe-environment-component.min.js"></script>

  <script>
    AFRAME.registerComponent('scene-controller', {
      init: function () {
        // UI Buttons
        const btnSpace = document.querySelector('#btn-space');
        const btnForest = document.querySelector('#btn-forest');
        const btnVolcano = document.querySelector('#btn-volcano');

        // Environments
        const earthEnv = document.querySelector('#earth-environment');
        const spaceEnv = document.querySelector('#space-environment');
        const mainSky = document.querySelector('#main-sky');

        // Switch to Space
        btnSpace.addEventListener('click', () => {
          earthEnv.setAttribute('visible', 'false');
          spaceEnv.setAttribute('visible', 'true');
          mainSky.setAttribute('color', '#020014');
        });

        // Switch to Earth: Forest
        btnForest.addEventListener('click', () => {
          earthEnv.setAttribute('visible', 'true');
          earthEnv.setAttribute('environment', 'preset: forest');
          spaceEnv.setAttribute('visible', 'false');
          mainSky.setAttribute('color', '#87CEEB');
        });

        // Switch to Earth: Volcano
        btnVolcano.addEventListener('click', () => {
          earthEnv.setAttribute('visible', 'true');
          earthEnv.setAttribute('environment', 'preset: volcano');
          spaceEnv.setAttribute('visible', 'false');
          mainSky.setAttribute('color', '#87CEEB');
        });

        // Interactive Planets Logic
        const planets = document.querySelectorAll('.planet');
        const infoBoard = document.querySelector('#planet-info');
        
        planets.forEach(planet => {
          planet.addEventListener('click', function() {
            const name = this.getAttribute('data-name');
            const type = this.getAttribute('data-type');
            infoBoard.setAttribute('text', `value: Target: ${name}\nType: ${type}; color: #00FF00; align: center; width: 4`);
          });
        });
      }
    });
  </script>
</head>
<body>

  <a-scene scene-controller cursor="rayOrigin: mouse">
    
    <a-assets>
      <a-mixin id="btn" geometry="primitive: plane; width: 1.5; height: 0.5" 
               material="color: #333; opacity: 0.8" 
               text="color: white; align: center; width: 4"
               animation__hover="property: material.color; to: #555; startEvents: mouseenter; dur: 200"
               animation__leave="property: material.color; to: #333; startEvents: mouseleave; dur: 200"
               animation__click="property: scale; to: 0.9 0.9 0.9; startEvents: click; dur: 100; dir: alternate; loop: 1">
      </a-mixin>
    </a-assets>

    <a-entity position="0 1.6 4">
      <a-camera>
        <a-cursor raycaster="objects: .clickable" color="#FFF" 
                  animation__click="property: scale; startEvents: click; from: 0.1 0.1 0.1; to: 1 1 1; dur: 150">
        </a-cursor>
      </a-camera>
    </a-entity>

    <a-sky id="main-sky" color="#87CEEB" transition="color 2000ms"></a-sky>

    <a-entity position="0 1.5 1">
      <a-entity id="btn-forest" mixin="btn" class="clickable" text="value: Earth: Forest" position="-1.7 0 0"></a-entity>
      <a-entity id="btn-volcano" mixin="btn" class="clickable" text="value: Earth: Volcano" position="0 0 0"></a-entity>
      <a-entity id="btn-space" mixin="btn" class="clickable" text="value: Explore Solar System" position="1.7 0 0"></a-entity>
    </a-entity>

    <a-entity id="earth-environment" environment="preset: forest; skyType: atmosphere; lighting: distant" visible="true"></a-entity>

    <a-entity id="space-environment" visible="false">
      
      <a-entity star-system="count: 2000; radius: 250; depth: 0"></a-entity>

      <a-entity id="planet-info" position="0 4 -2" text="value: Select a celestial body...; color: white; align: center; width: 5"></a-entity>

      <a-entity position="0 0 -8">
        
        <a-sphere class="clickable planet" data-name="The Sun" data-type="Yellow Dwarf Star" 
                  radius="1.5" color="#FFD700" material="shader: flat"
                  animation__pulse="property: scale; to: 1.02 1.02 1.02; dir: alternate; loop: true; dur: 2000">
          <a-light type="point" color="#FFF" intensity="1.5" distance="100"></a-light>
        </a-sphere>

        <a-entity animation="property: rotation; to: 0 360 0; loop: true; dur: 4000; easing: linear">
          <a-sphere class="clickable planet" data-name="Mercury" data-type="Terrestrial Planet"
                    position="2.2 0 0" radius="0.08" color="#888888"></a-sphere>
        </a-entity>

        <a-entity animation="property: rotation; to: 0 360 0; loop: true; dur: 7000; easing: linear">
          <a-sphere class="clickable planet" data-name="Venus" data-type="Terrestrial Planet"
                    position="3.0 0 0" radius="0.15" color="#e3bb76"></a-sphere>
        </a-entity>

        <a-entity animation="property: rotation; to: 0 360 0; loop: true; dur: 10000; easing: linear">
          <a-sphere class="clickable planet" data-name="Earth" data-type="Terrestrial Planet"
                    position="4.0 0 0" radius="0.16" color="#287AB8">
            <a-entity animation="property: rotation; to: 0 360 0; loop: true; dur: 2000; easing: linear">
              <a-sphere position="0.3 0 0" radius="0.04" color="#AAAAAA"></a-sphere>
            </a-entity>
          </a-sphere>
        </a-entity>

        <a-entity animation="property: rotation; to: 0 360 0; loop: true; dur: 18000; easing: linear">
          <a-sphere class="clickable planet" data-name="Mars" data-type="Terrestrial Planet"
                    position="5.2 0 0" radius="0.12" color="#c1440e"></a-sphere>
        </a-entity>

        <a-entity animation="property: rotation; to: 0 360 0; loop: true; dur: 45000; easing: linear">
          <a-sphere class="clickable planet" data-name="Jupiter" data-type="Gas Giant"
                    position="8.0 0 0" radius="0.7" color="#d39c7e"></a-sphere>
        </a-entity>

        <a-entity animation="property: rotation; to: 0 360 0; loop: true; dur: 80000; easing: linear">
          <a-sphere class="clickable planet" data-name="Saturn" data-type="Gas Giant"
                    position="11.5 0 0" radius="0.6" color="#ead6b8">
             <a-ring color="#d8c596" radius-inner="0.8" radius-outer="1.4" rotation="-70 0 0" material="side: double; opacity: 0.8"></a-ring>
          </a-sphere>
        </a-entity>

        <a-entity animation="property: rotation; to: 0 360 0; loop: true; dur: 120000; easing: linear">
          <a-sphere class="clickable planet" data-name="Uranus" data-type="Ice Giant"
                    position="15.0 0 0" radius="0.35" color="#4b70dd">
            <a-ring color="#ffffff" radius-inner="0.5" radius-outer="0.6" rotation="-10 0 0" material="side: double; opacity: 0.4"></a-ring>
          </a-sphere>
        </a-entity>

        <a-entity animation="property: rotation; to: 0 360 0; loop: true; dur: 160000; easing: linear">
          <a-sphere class="clickable planet" data-name="Neptune" data-type="Ice Giant"
                    position="18.5 0 0" radius="0.34" color="#274687"></a-sphere>
        </a-entity>

      </a-entity>
    </a-entity>

  </a-scene>
</body>
</html>
